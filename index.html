<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ишренну буну ишру шессар — Ферма</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        body {
            background: #0d0d0d;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }
        .game-wrapper {
            position: relative;
            width: 100%;
            max-width: 480px;
            aspect-ratio: 9/16;
            max-height: 100vh;
            border: 3px solid #5a3a1a;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
        }
        .ui-overlay {
            position: absolute;
            top: 8px;
            left: 8px;
            right: 8px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 10;
        }
        .ui-panel {
            background: rgba(0,0,0,0.7);
            border: 2px solid #8b6914;
            border-radius: 8px;
            padding: 6px 10px;
            color: #f5e6d3;
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 1px;
            backdrop-filter: blur(4px);
        }
        .bottom-panel {
            position: absolute;
            bottom: 8px;
            left: 8px;
            right: 8px;
            display: flex;
            gap: 5px;
            z-index: 10;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn {
            background: rgba(0,0,0,0.75);
            border: 2px solid #8b6914;
            color: #f5e6d3;
            padding: 8px 12px;
            border-radius: 20px;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 1px;
            cursor: pointer;
            backdrop-filter: blur(4px);
            transition: all 0.15s;
            pointer-events: auto;
        }
        .btn:active {
            background: #8b6914;
            color: #fff;
            transform: scale(0.95);
        }
        .dialog-box {
            position: absolute;
            bottom: 90px;
            left: 12px;
            right: 12px;
            background: rgba(20,12,4,0.92);
            border: 2px solid #c8a44e;
            border-radius: 14px;
            padding: 14px 16px;
            color: #f5e6d3;
            font-size: 13px;
            z-index: 20;
            display: none;
            flex-direction: column;
            gap: 10px;
            backdrop-filter: blur(6px);
        }
        .dialog-box.active {
            display: flex;
        }
        .dialog-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        .dialog-buttons .btn {
            font-size: 11px;
            padding: 6px 12px;
        }
    </style>
</head>
<body>
    <div class="game-wrapper" id="gameWrapper">
        <canvas id="gameCanvas"></canvas>

        <div class="ui-overlay">
            <div class="ui-panel" id="moneyDisplay">🪙 0</div>
            <div class="ui-panel" id="dayDisplay">☀️ День 1 · Весна</div>
        </div>

        <div class="bottom-panel" id="bottomPanel">
            <button class="btn" id="btnPlant">🌱 Сажать</button>
            <button class="btn" id="btnWater">💧 Полить</button>
            <button class="btn" id="btnHarvest">🧺 Собрать</button>
            <button class="btn" id="btnSell">💰 Продать</button>
            <button class="btn" id="btnNextDay">⏩ День</button>
        </div>

        <div class="dialog-box" id="dialogBox">
            <div id="dialogText">Привет, фермер!</div>
            <div class="dialog-buttons" id="dialogButtons"></div>
        </div>
    </div>

    <script>
        const CANVAS_WIDTH = 480;
        const CANVAS_HEIGHT = 850;
    </script>
</body>
</html>
